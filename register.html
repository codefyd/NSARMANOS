<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة التسجيل والقبول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html">نظام المجمع</a></div></nav>
<div class="container py-5">
  <div class="section-card">
    <h2 class="section-title">بوابة التسجيل والقبول</h2>
    <form id="registrationForm" class="row g-3">
      <div class="col-12"><h5 class="fw-bold">بيانات الطالب</h5></div>
      <div class="col-md-6"><label class="form-label">اسم الطالب ثلاثي</label><input class="form-control" name="studentName" required></div>
      <div class="col-md-6"><label class="form-label">هوية الطالب</label><input class="form-control" name="studentNationalId" required></div>
      <div class="col-md-6"><label class="form-label">رقم جوال الطالب</label><input class="form-control" name="studentMobile" required></div>
      <div class="col-md-6"><label class="form-label">تاريخ ميلاد الطالب</label><input type="date" class="form-control" name="studentBirthDate" required></div>
      <div class="col-12"><label class="form-label">العنوان / الحي</label><input class="form-control" name="studentAddress" required></div>
      <div class="col-md-6"><label class="form-label">المرحلة الدراسية</label><select class="form-select" name="stage" required><option value="">اختر</option><option>ابتدائي</option><option>متوسط</option><option>ثانوي</option><option>جامعي</option></select></div>
      <div class="col-md-6"><label class="form-label">الصف الدراسي</label><select class="form-select" name="grade" required><option value="">اختر</option><option>الأول</option><option>الثاني</option><option>الثالث</option><option>الرابع</option><option>الخامس</option><option>السادس</option></select></div>
      <div class="col-12 mt-3"><h5 class="fw-bold">بيانات ولي الأمر</h5></div>
      <div class="col-md-6"><label class="form-label">اسم ولي الأمر ثلاثي</label><input class="form-control" name="guardianName" required></div>
      <div class="col-md-6"><label class="form-label">رقم جوال ولي الأمر</label><input class="form-control" name="guardianMobile" required></div>
      <div class="col-md-6"><label class="form-label">رقم هوية ولي الأمر</label><input class="form-control" name="guardianNationalId" required></div>
      <div class="col-md-6"><label class="form-label">صلة ولي الأمر</label><select class="form-select" name="guardianRelation" required><option value="">اختر</option><option>أب</option><option>أخ</option><option>عم</option><option>خال</option><option>غير ذلك</option></select></div>
      <div class="col-12"><label class="form-label">ملاحظات إضافية</label><textarea class="form-control" name="notes"></textarea></div>
      <div class="col-12 d-flex gap-2"><button class="btn btn-success">إرسال الطلب</button><a class="btn btn-outline-secondary" href="index.html">عودة</a></div>
    </form>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner-border text-primary"></div></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="config.js"></script><script src="app.js"></script>
</body></html>
