<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة العاملين</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html">نظام المجمع</a><div class="ms-auto d-flex align-items-center gap-3"><div><strong id="currentUserName">-</strong><div class="small-muted" id="currentUserRole">-</div></div><button class="btn btn-outline-danger" id="logoutBtn">خروج</button></div></div></nav>
<div class="container py-4" id="dashboardRoot">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3"><h2 class="section-title mb-0">لوحة العاملين</h2><button class="btn btn-outline-primary" id="refreshDashboardBtn">تحديث البيانات</button></div>
  <div class="row g-3 mb-4" id="kpis"></div>
  <div class="dashboard-layout">
    <div class="sidebar section-card">
      <a href="#" class="side-link active" data-panel="panelStudents"><i class="fa-solid fa-users"></i> إدارة الطلاب</a>
      <a href="#" class="side-link" data-panel="panelRequests"><i class="fa-solid fa-inbox"></i> الطلبات الواردة</a>
      <a href="#" class="side-link" data-panel="panelWarnings"><i class="fa-solid fa-triangle-exclamation"></i> الإنذارات</a>
      <a href="#" class="side-link" data-panel="panelSettings"><i class="fa-solid fa-gear"></i> الإعدادات</a>
    </div>
    <div>
      <section class="page-panel active" id="panelStudents">
        <div class="section-card">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3"><h4 class="fw-bold mb-0">إدارة الطلاب</h4><div id="studentActions" class="d-flex gap-2 d-none"><button class="btn btn-success" id="openAddStudentBtn">إضافة طالب</button><button class="btn btn-outline-primary" id="openBulkUpdateBtn">تعديل جماعي</button><button class="btn btn-outline-secondary" id="exportCsvBtn">تصدير CSV</button></div></div>
          <div id="studentsTableWrap"></div>
        </div>
      </section>
      <section class="page-panel" id="panelRequests">
        <div id="requestsPanelWrap">
          <div class="section-card mb-3"><h4 class="fw-bold mb-3">طلبات التسجيل</h4><div id="registrationRequestsTable"></div></div>
          <div class="section-card"><h4 class="fw-bold mb-3">طلبات تعديل البيانات</h4><div id="updateRequestsTable"></div></div>
        </div>
      </section>
      <section class="page-panel" id="panelWarnings">
        <div class="section-card mb-3" id="teacherToolsWrap"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="fw-bold mb-0">ملاحظات المعلمين</h4><button class="btn btn-outline-primary" id="addTeacherNoteBtn">إضافة ملاحظة</button></div><div id="notesTable"></div></div>
        <div class="section-card mb-3" id="educationalToolsWrap"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="fw-bold mb-0">الإنذارات التعليمية</h4><button class="btn btn-outline-primary" id="addEduWarningBtn">إنذار تعليمي جديد</button></div><div id="eduWarningsTable"></div></div>
        <div class="section-card" id="adminWarningsToolsWrap"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="fw-bold mb-0">الإنذارات الإدارية</h4><button class="btn btn-outline-primary" id="generateAdminWarningsBtn">توليد الإنذارات الإدارية</button></div><div id="adminWarningsTable"></div></div>
      </section>
      <section class="page-panel" id="panelSettings"><div class="row g-3" id="settingsWrap"></div></section>
    </div>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner-border text-primary"></div></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="config.js"></script><script src="app.js"></script>
</body></html>
